<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAcademy - বাক্য শুদ্ধি মাস্টার</title>
    <style>
        /* Modern Animated Background */
        body {
            font-family: 'Kalpurush', 'SolaimanLipi', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            scroll-behavior: smooth;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Main Container */
        .glass-panel {
            background: rgba(15, 32, 39, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            position: relative;
            margin-bottom: 50px;
        }

        h2 {
            text-align: center;
            font-size: 32px;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 2px dashed rgba(255,255,255,0.2);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        
        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .search-box {
            flex-grow: 1;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.4);
            color: #fff;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
        }
        .btn {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        /* Item Styles */
        .shuddhi-item {
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px 20px;
            border-left: 5px solid #ff4b2b;
            cursor: pointer;
            transition: 0.3s;
            scroll-margin-top: 100px;
        }
        .shuddhi-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .serial { color: #00c6ff; font-weight: bold; min-width: 45px; font-size: 20px; }
        .incorrect { flex-grow: 1; color: #ff9999; font-size: 20px; }
        .fav-icon { font-size: 24px; color: rgba(255,255,255,0.2); transition: 0.3s; }
        .fav-icon.active { color: #f6d365; text-shadow: 0 0 10px #f6d365; }

        .correct {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: #43e97b;
            font-size: 22px;
            font-weight: bold;
            animation: fadeIn 0.4s ease;
        }
        .note {
            display: none;
            color: #00d2ff;
            font-size: 16px;
            font-style: italic;
            margin-top: 5px;
        }

        /* Rocket Nav */
        .right-nav {
            position: fixed;
            right: 30px;
            bottom: 30px;
            background: rgba(15, 32, 39, 0.9);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
            width: 65px;
            height: 65px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }
        .right-nav.expanded { width: 70px; height: 280px; border-radius: 25px; padding: 10px 0; }
        .rocket-toggle { font-size: 30px; height: 65px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
        .nav-content { display: none; flex-direction: column; gap: 15px; align-items: center; }
        .right-nav.expanded .nav-content { display: flex; }
        .jump-input { width: 40px; padding: 5px; border-radius: 5px; border: 1px solid #00c6ff; background: #000; color: #fff; text-align: center; outline: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) { .glass-panel { padding: 20px; } }
    </style>
</head>
<body>

<div class="glass-panel">
    <h2>✨ বাক্য শুদ্ধি 📖</h2>
    
    <div class="toolbar">
        <input type="text" id="search" class="search-box" placeholder="🔍 বাক্য খুঁজুন..." onkeyup="filter()">
        <button class="btn" id="favBtn" onclick="toggleFavView()">⭐ ফেভারিট</button>
        <button class="btn" onclick="scrollToLastRead()">🕒 শেষ পড়া</button>
    </div>

    <div id="container"></div>
</div>

<div class="right-nav" id="rightNav">
    <div class="nav-content">
        <button style="background:none; border:none; color:white; font-size: 20px; cursor:pointer;" onclick="window.scrollTo(0,0)">⬆️</button>
        <input type="number" id="jumpInput" class="jump-input" placeholder="নং">
        <button style="background:#ff416c; border:none; color:white; border-radius:5px; padding:2px 8px; cursor:pointer;" onclick="jump()">যান</button>
        <button style="background:none; border:none; color:white; font-size: 20px; cursor:pointer;" onclick="window.scrollTo(0,document.body.scrollHeight)">⬇️</button>
    </div>
    <div class="rocket-toggle" onclick="document.getElementById('rightNav').classList.toggle('expanded')">🚀</div>
</div>

        { inc: "বাংলাদেশ একটি উন্নতশীল দেশ।", cor: "বাংলাদেশ একটি উন্নয়নশীল দেশ।", note: "যথাযথ বিশেষণ।" },
        { inc: "অনাবশ্যকীয় ব্যাপারে কৌতূহল ভাল নয়।", cor: "অনাবশ্যক ব্যাপারে কৌতূহল ভাল নয়।", note: "প্রত্যয়ঘটিত।" },
        { inc: "গণিত খুব কঠিন।", cor: "গণিত খুব কঠিন বিষয়।", note: "বাক্য সম্পূর্ণকরণ।" },
        { inc: "অদ্য সভায় মহতী অধিবেশন হবে।", cor: "অদ্য মহতী সভায় অধিবেশন হবে।", note: "পদবিন্যাস।" }


    ];

    let favorites = JSON.parse(localStorage.getItem('shuddhiFavs')) || [];
    let showFavs = false;

    function loadData() {
        const container = document.getElementById('container');
        container.innerHTML = "";
        data.forEach((item, index) => {
            const isFav = favorites.includes(index);
            if (showFavs && !isFav) return;

            const div = document.createElement('div');
            div.className = 'shuddhi-item';
            div.id = `item-${index + 1}`;
            div.onclick = () => toggle(index);
            div.innerHTML = `
                <div class="header-row">
                    <span class="serial">${index + 1}.</span>
                    <div class="incorrect">❌ ${item.inc}</div>
                    <span class="fav-icon ${isFav ? 'active' : ''}" onclick="toggleFav(event, ${index})">★</span>
                </div>
                <div id="cor-${index}" class="correct">✅ ${item.cor}</div>
                <div id="note-${index}" class="note">💡 ${item.note}</div>
            `;
            container.appendChild(div);
        });
    }

    function toggle(index) {
        const cor = document.getElementById(`cor-${index}`);
        const note = document.getElementById(`note-${index}`);
        const isVisible = cor.style.display === "block";
        cor.style.display = isVisible ? "none" : "block";
        note.style.display = isVisible ? "none" : "block";
        if(!isVisible) localStorage.setItem('shuddhiLastRead', index + 1);
    }

    function toggleFav(e, index) {
        e.stopPropagation();
        const pos = favorites.indexOf(index);
        if (pos === -1) favorites.push(index);
        else favorites.splice(pos, 1);
        localStorage.setItem('shuddhiFavs', JSON.stringify(favorites));
        loadData();
    }

    function toggleFavView() {
        showFavs = !showFavs;
        document.getElementById('favBtn').innerText = showFavs ? "📖 সব দেখুন" : "⭐ ফেভারিট";
        loadData();
    }

    function filter() {
        const term = document.getElementById('search').value.toLowerCase();
        const items = document.querySelectorAll('.shuddhi-item');
        items.forEach(it => it.style.display = it.innerText.toLowerCase().includes(term) ? "block" : "none");
    }

    function jump() {
        const val = document.getElementById('jumpInput').value;
        const el = document.getElementById(`item-${val}`);
        if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
    }

    function scrollToLastRead() {
        const last = localStorage.getItem('shuddhiLastRead');
        if(last) {
            const el = document.getElementById(`item-${last}`);
            if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
        }
    }

    loadData();
</script>
</body>
</html>
