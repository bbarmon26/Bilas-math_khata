<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BILAS ACADEMY | Master Study Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Hind+Siliguri:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --paper-bg: #fdf6e3;
            --ink-color: #1e3a8a;
            --margin-color: rgba(220, 38, 38, 0.4);
            --line-bg: #e2d7bf;
        }

        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            margin: 0; overflow: hidden;
            background-color: #000000;
        }

        .handwritten {
            font-family: 'Caveat', 'Hind Siliguri', cursive;
            font-style: italic; letter-spacing: -0.5px;
        }

        .hub-book {
            box-shadow: inset 2px 0 5px rgba(0,0,0,0.4), 10px 10px 20px rgba(0,0,0,0.8);
            border-radius: 4px 12px 12px 4px; position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer; background-image: url('https://www.transparenttextures.com/patterns/leather.png');
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
            aspect-ratio: 1 / 1.3;
        }
        .hub-book:active { transform: scale(0.95); }
        
        .book-spine { position: absolute; left: 0; top: 0; bottom: 0; width: 12px; background: rgba(0,0,0,0.3); border-radius: 4px 0 0 4px; border-right: 1px solid rgba(255,255,255,0.1); }

        .theme-math { --paper-bg: #fdf6e3; --ink-color: #1e3a8a; --margin-color: rgba(220, 38, 38, 0.4); --line-bg: #e2d7bf; border-left-color: #1e293b; }
        .theme-bangla { --paper-bg: #f0fdf4; --ink-color: #065f46; --margin-color: rgba(22, 163, 74, 0.4); --line-bg: #bbf7d0; border-left-color: #064e3b; }
        .theme-english { --paper-bg: #f8fafc; --ink-color: #334155; --margin-color: rgba(220, 38, 38, 0.4); --line-bg: #cbd5e1; border-left-color: #7f1d1d; }
        .theme-gk { --paper-bg: #ffffff; --ink-color: #0f172a; --margin-color: rgba(148, 163, 184, 0.4); --line-bg: #f1f5f9; border-left-color: #0f172a; }

        .paper-stack {
            background-color: var(--paper-bg);
            background-image: repeating-linear-gradient(transparent, transparent 31px, var(--line-bg) 31px, var(--line-bg) 32px);
            border-radius: 2px 20px 20px 2px; border-left: 20px solid;
            box-shadow: 1px 1px 0 #fff, 5px 5px 0 var(--line-bg), 20px 20px 40px rgba(0,0,0,0.8);
            height: 96vh; margin: 2vh auto; position: relative; overflow: hidden;
            transition: all 0.5s ease;
        }
        
        .paper-stack::before { 
            content: ''; position: absolute; top: 0; bottom: 0; left: 45px; width: 2px; 
            background-color: var(--margin-color); z-index: 41; pointer-events: none; 
        }

        .text-ink { color: var(--ink-color); }
        .border-ink { border-color: var(--ink-color); }

        .theme-header {
            background-color: var(--paper-bg); 
            position: sticky; top: 0; z-index: 40; padding-top: 0.8rem; padding-bottom: 0.6rem;
            margin-left: -60px; padding-left: 60px; 
            margin-right: -15px; padding-right: 15px; 
            border-bottom: 2px solid var(--margin-color);
        }

        .page-content { position: relative; z-index: 10; padding-left: 60px; padding-right: 15px; height: 100%; overflow-y: auto; overflow-x: hidden; }
        .line-input { background: transparent; border: none; border-bottom: 1.5px solid; width: 100%; outline: none; }

        .taped-photo {
            background: #ffffff; padding: 4px; box-shadow: 3px 6px 15px rgba(0,0,0,0.3);
            transform: rotate(-1.5deg); margin: 15px auto 25px auto; width: 100%; max-width: 320px; position: relative;
        }
        .taped-photo::before {
            content: ''; position: absolute; top: -15px; left: 50%; transform: translateX(-50%) rotate(2deg);
            width: 100px; height: 35px; background-color: #fdfdfd; border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 1px 2px 4px rgba(0,0,0,0.1); z-index: 40; border-radius: 2px;
        }
        
        #fullscreenViewer { position: fixed; inset: 0; z-index: 700; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .flip-out-fwd { animation: flipOutF 0.3s forwards; transform-origin: left center; }
        .flip-in-fwd { animation: flipInF 0.3s forwards; transform-origin: left center; }
        .flip-out-bwd { animation: flipOutB 0.3s forwards; transform-origin: left center; }
        .flip-in-bwd { animation: flipInB 0.3s forwards; transform-origin: left center; }
        @keyframes flipOutF { to { transform: rotateY(-90deg); opacity: 0; } }
        @keyframes flipInF { from { transform: rotateY(90deg); opacity: 0; } to { transform: rotateY(0deg); opacity: 1; } }
        @keyframes flipOutB { to { transform: rotateY(90deg); opacity: 0; } }
        @keyframes flipInB { from { transform: rotateY(-90deg); opacity: 0; } to { transform: rotateY(0deg); opacity: 1; } }
        
        .fade-out { animation: fadeO 0.4s forwards; }
        .fade-in { animation: fadeI 0.4s forwards; display: flex !important; }
        @keyframes fadeO { to { opacity: 0; visibility: hidden; } }
        @keyframes fadeI { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="text-slate-900">

    <div id="masterHome" class="fixed inset-0 z-[200] flex flex-col items-center pt-10 px-4 overflow-y-auto pb-6" style="background-image: url('https://images.unsplash.com/photo-1551269901-5c5e14c25df7?q=80&w=2069&auto=format&fit=crop'); background-size: cover; background-position: center;">
        <div class="absolute inset-0 bg-black/60 pointer-events-none"></div>
        
        <div class="relative z-10 w-full flex flex-col items-center h-full">
            <div class="text-center mb-8 mt-4">
                <h1 class="text-4xl font-extrabold text-white tracking-widest uppercase" style="text-shadow: 2px 2px 10px rgba(0,0,0,0.9);">BILAS ACADEMY</h1>
                <p class="text-white/80 text-sm tracking-[0.1em] mt-3 font-bold shadow-black drop-shadow-md handwritten">"পরিশ্রম সৌভাগ্যের প্রসূতি"</p>

                        <i data-lucide="feather" style="color: #a7f3d0; width: 20px; height: 20px;"></i>
                    </div>
                    <h2 class="text-xl font-bold uppercase tracking-wider text-center leading-tight drop-shadow-md" style="color: #a7f3d0;">বাংলা</h2>
                    <p class="text-[8px] uppercase tracking-widest mt-2 text-center drop-shadow-md" style="color: rgba(167, 243, 208, 0.8);">সাহিত্য ও ব্যাকরণ</p>
                </div>
                <div onclick="openNotebook('english', 'English Notes')" class="hub-book" style="background-color: #7f1d1d; border: 1px solid #991b1b;">

                        <i data-lucide="book-open" style="color: #fecaca; width: 20px; height: 20px;"></i>
                    </div>
                    <h2 class="text-xl font-bold uppercase tracking-wider text-center leading-tight drop-shadow-md" style="color: #fecaca;">English</h2>

                </div>
                <div onclick="openNotebook('math', 'গণিত খাতা')" class="hub-book" style="background-color: #1e293b; border: 1px solid #334155;">
                    <div class="book-spine"></div>
                    <div class="w-10 h-10 rounded-full border-2 flex items-center justify-center mb-3" style="border-color: #fbbf24; background-color: #1e293b;">
                        <i data-lucide="calculator" style="color: #fbbf24; width: 20px; height: 20px;"></i>
                    </div>

                <div onclick="openNotebook('gk', 'সা. জ্ঞান')" class="hub-book" style="background-color: #0f172a; border: 1px solid #1e293b;">
                    <div class="book-spine"></div>
                    <div class="w-10 h-10 rounded-full border-2 flex items-center justify-center mb-3" style="border-color: #e2e8f0; background-color: #0f172a;">
                        <i data-lucide="globe" style="color: #e2e8f0; width: 20px; height: 20px;"></i>
                    </div>
                    <h2 class="text-xl font-bold uppercase tracking-wider text-center leading-tight drop-shadow-md" style="color: #e2e8f0;">সা. জ্ঞান</h2>
                    <p class="text-[8px] uppercase tracking-widest mt-2 text-center drop-shadow-md" style="color: rgba(226, 232, 240, 0.8);">বিসিএস ও জব প্রস্তুতি</p>
                </div>
            </div>
            
            <div class="w-full text-center mt-auto pt-8">
                <p class="text-white/50 text-[11px] tracking-widest font-mono uppercase font-bold">©️ বিলাস। ২০২৬।</p>
            </div>
        </div>
    </div>

    <div id="fullscreenViewer">
        <button onclick="closeFullImage()" class="absolute top-5 right-5 text-white bg-white/20 p-2 rounded-full"><i data-lucide="x"></i></button>
        <iframe id="fullscreenFrame" class="w-[98%] h-[85%] rounded-lg bg-white" src=""></iframe>
    </div>

    <div id="mainApp" class="hidden max-w-2xl mx-auto w-[96%] paper-stack">
        
        <div class="absolute top-1 left-[3px] z-50 flex flex-col gap-3">
            <button onclick="goBackToDesk()" class="text-red-600/80 hover:text-red-700 flex flex-col items-center group">
                <i data-lucide="library" class="w-5 h-5 group-active:scale-90 transition-transform"></i>
                <span class="text-[8px] font-bold mt-0.5">ডেস্ক</span>
            </button>
            <button onclick="goHome()" class="text-blue-600/80 hover:text-blue-700 flex flex-col items-center group">
                <i data-lucide="home" class="w-5 h-5 group-active:scale-90 transition-transform"></i>
                <span class="text-[8px] font-bold mt-0.5">হোম</span>
            </button>
        </div>

        <div class="fixed bottom-6 right-6 z-[100] flex flex-col-reverse items-end gap-3">
            <button onclick="toggleQuickMenu()" class="w-12 h-12 rounded-full bg-slate-800 text-white shadow-lg flex items-center justify-center border-2 border-white/20 active:scale-90 transition-transform">
                <i data-lucide="layers" class="w-6 h-6"></i>
            </button>
            <div id="quickMenu" class="hidden flex-col gap-3 mb-1">
                <button onclick="quickSwitch('gk', 'সা. জ্ঞান')" class="w-10 h-10 rounded-full bg-[#0f172a] text-[#e2e8f0] border border-white shadow-md flex items-center justify-center"><i data-lucide="globe" class="w-5 h-5"></i></button>
                <button onclick="quickSwitch('english', 'English Notes')" class="w-10 h-10 rounded-full bg-[#7f1d1d] text-[#fecaca] border border-white shadow-md flex items-center justify-center"><i data-lucide="book-open" class="w-5 h-5"></i></button>
                <button onclick="quickSwitch('bangla', 'বাংলা খাতা')" class="w-10 h-10 rounded-full bg-[#064e3b] text-[#a7f3d0] border border-white shadow-md flex items-center justify-center"><i data-lucide="feather" class="w-5 h-5"></i></button>
                <button onclick="quickSwitch('math', 'গণিত খাতা')" class="w-10 h-10 rounded-full bg-[#1e293b] text-[#fbbf24] border border-white shadow-md flex items-center justify-center"><i data-lucide="calculator" class="w-5 h-5"></i></button>
            </div>
        </div>

        <div id="pageContent" class="page-content no-scrollbar">
            <header class="theme-header">
                <div class="flex justify-center items-center mb-3 relative w-full">
                    <h2 id="appTitle" class="text-2xl font-bold handwritten flex items-center gap-2 text-ink">
                        <i data-lucide="pen-tool" class="text-red-600 w-5 h-5"></i> <span>Math Notes</span>
                    </h2>
                    <span id="statsBadge" class="absolute right-0 text-[10px] font-bold bg-ink text-white px-2 py-1 rounded-full opacity-80 hidden">০ টি</span>
                </div>

                <div class="search-container relative w-full mt-2">
                    <input type="text" id="searchInput" oninput="executeSearch()" placeholder="টপিক খুঁজুন..." class="handwritten line-input text-xl text-ink border-ink pb-1 pr-10">
                    <i data-lucide="search" class="absolute right-1 top-0.5 text-ink opacity-70 w-7 h-7"></i>
                </div>
            </header>

            <main class="pb-24">
                <div id="loader" class="hidden flex flex-col items-center justify-center py-10">
                    <i data-lucide="loader" class="w-8 h-8 animate-spin text-ink"></i>
                </div>
                <div id="view-dashboard" class="flex flex-col mt-2"></div>
                <div id="view-topics" class="hidden flex flex-col">
                    <h2 id="chapterHeading" class="text-2xl font-bold handwritten border-b-2 mb-4 inline-block mt-4 text-ink border-ink/30"></h2>
                    <div id="topicList" class="flex flex-col"></div>
                </div>
                <div id="view-image" class="hidden flex flex-col items-center">
                    <h3 id="imageTitle" class="w-full text-xl font-bold handwritten mt-2 mb-4 leading-tight text-center text-ink"></h3>
                    
                    <div id="imageContainer" class="w-full flex flex-col items-center gap-6"></div>
                    
                    <p id="imageNote" class="text-center mt-3 handwritten text-xs font-bold opacity-80 italic px-2 leading-relaxed text-ink"></p>
                    <div class="mt-10 w-full px-4 text-center">
                        <a id="videoBtn" href="#" target="_blank" class="hidden items-center justify-center gap-3 bg-red-600 text-white py-3 rounded-full text-base font-bold shadow-lg transform active:scale-95 transition-all mx-auto">
                            <i data-lucide="play-circle" class="w-6 h-6"></i> ভিডিও ক্লাস দেখুন
                        </a>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const DB_URLS = {
            math: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQWvEMlB8yjZ96rWKGPmXIevhTjaFZ_SuLb_42IGHdRNAcljvveIJAPnSHlz13tu6wyr1X8D3lYUxJm/pub?gid=566628590&single=true&output=csv',
            bangla: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQWvEMlB8yjZ96rWKGPmXIevhTjaFZ_SuLb_42IGHdRNAcljvveIJAPnSHlz13tu6wyr1X8D3lYUxJm/pub?gid=840059015&single=true&output=csv',
            english: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQWvEMlB8yjZ96rWKGPmXIevhTjaFZ_SuLb_42IGHdRNAcljvveIJAPnSHlz13tu6wyr1X8D3lYUxJm/pub?gid=1921260160&single=true&output=csv',
            gk: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQWvEMlB8yjZ96rWKGPmXIevhTjaFZ_SuLb_42IGHdRNAcljvveIJAPnSHlz13tu6wyr1X8D3lYUxJm/pub?gid=570235809&single=true&output=csv'
        };

        let memoryCache = { math: null, bangla: null, english: null, gk: null };
        let currentSubject = '';
        let rawData = [], groupedChapters = {}, currentViewState = 'dashboard';

        function toggleQuickMenu() {
            const menu = document.getElementById('quickMenu');
            if(menu) { menu.classList.toggle('hidden'); menu.classList.toggle('flex'); }
        }

        function quickSwitch(subject, title) {
            toggleQuickMenu();
            if(subject === currentSubject) return;
            openNotebook(subject, title, true);
        }

        function openNotebook(subject, title, isQuickSwitch = false) {
            try {
                currentSubject = subject;
                const titleSpan = document.querySelector('#appTitle span');
                if(titleSpan) titleSpan.innerText = title;
                const app = document.getElementById('mainApp');
                if(app) app.className = `hidden max-w-2xl mx-auto w-[96%] paper-stack theme-${subject}`;

                if(!isQuickSwitch) {
                    const desk = document.getElementById('masterHome');
                    if(desk) desk.classList.add('fade-out');
                    setTimeout(() => {
                        if(desk) desk.classList.add('hidden');
                        if(app) app.classList.remove('hidden');
                        try { history.pushState({view: 'dashboard', sub: subject}, '', `#${subject}`); } catch(e){}
                        loadDataForSubject();
                    }, 300);
                } else {
                    if(app) app.classList.remove('hidden');
                    const sInput = document.getElementById('searchInput');
                    if(sInput) sInput.value = '';
                    performPageFlip('view-dashboard', () => {}, true);
                    try { history.pushState({view: 'dashboard', sub: subject}, '', `#${subject}`); } catch(e){}
                    loadDataForSubject();
                }
                setTimeout(() => { if(typeof lucide !== 'undefined') lucide.createIcons(); }, 350);
            } catch(e) {}
        }

        function goBackToDesk() {
            if(currentViewState !== 'dashboard') {
                const sInput = document.getElementById('searchInput');
                if(sInput) sInput.value = '';
                performPageFlip('view-dashboard', () => renderDashboard(), true);
                currentViewState = 'dashboard';
            }
            const app = document.getElementById('mainApp');
            if(app) app.classList.add('hidden');
            const stats = document.getElementById('statsBadge');
            if(stats) stats.classList.add('hidden');
            const desk = document.getElementById('masterHome');
            if(desk) { desk.classList.remove('hidden', 'fade-out'); desk.classList.add('fade-in'); }
            try { history.pushState({view: 'hub'}, '', '#hub'); } catch(e){}
            setTimeout(() => { if(desk) desk.classList.remove('fade-in'); }, 400);
        }

        function loadDataForSubject() {
            const stats = document.getElementById('statsBadge');
            if(stats) stats.classList.add('hidden');
            if(memoryCache[currentSubject]) {
                rawData = memoryCache[currentSubject];
                processData();
                return;
            }
            const loader = document.getElementById('loader');
            if(loader) { loader.classList.remove('hidden'); loader.classList.add('flex'); }
            const viewDash = document.getElementById('view-dashboard');
            if(viewDash) viewDash.innerHTML = '';
            var xhr = new XMLHttpRequest();
            xhr.open("GET", DB_URLS[currentSubject] + "&cache=" + new Date().getTime(), true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4) {
                    if(loader) { loader.classList.remove('flex'); loader.classList.add('hidden'); }
                    if (xhr.status == 200) { parseCSV(xhr.responseText); } 
                }
            };
            xhr.send();
        }

        function parseCSV(text) {
            let lines = text.split(/\r?\n/);
            if(lines.length === 0) return;
            let headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ''));
            let tempData = [];
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim() == "") continue;
                
                // Advanced CSV parsing to handle commas inside quotes
                let currentline = [];
                let inQuotes = false;
                let val = '';
                for(let char of lines[i]) {
                    if(char === '"') inQuotes = !inQuotes;
                    else if(char === ',' && !inQuotes) {
                        currentline.push(val.trim().replace(/^"|"$/g, ''));
                        val = '';
                    } else val += char;
                }
                currentline.push(val.trim().replace(/^"|"$/g, ''));

                if (currentline.length < 2) continue;
                let obj = {};
                headers.forEach((h, idx) => { obj[h] = currentline[idx]; });
                tempData.push(obj);
            }
            rawData = tempData;
            memoryCache[currentSubject] = rawData; 
            processData();
        }

        function processData() {
            groupedChapters = {};
            rawData.forEach(item => {
                const ch = item.Chapter || 'অন্যান্য';
                if (!groupedChapters[ch]) groupedChapters[ch] = [];
                groupedChapters[ch].push(item);
            });
            const badge = document.getElementById('statsBadge');
            if(badge) { badge.innerText = `${rawData.length} টি নোট`; badge.classList.remove('hidden'); }
            renderDashboard();
        }

        function renderDashboard(list = null) {
            const container = document.getElementById('view-dashboard');
            if(!container) return;
            container.innerHTML = '';
            if (list) {
                if(list.length === 0) container.innerHTML = `<p class="text-center mt-10 opacity-50 handwritten text-ink">কিছু পাওয়া যায়নি!</p>`;
                list.forEach(item => container.innerHTML += buildTopicCard(item));
            } else {
                Object.keys(groupedChapters).forEach(name => {
                    container.innerHTML += `
                        <div onclick="openChapter('${name}')" class="flex items-center gap-3 py-3 border-b border-ink/20 cursor-pointer group ink-hover">
                            <i data-lucide="book" class="w-5 h-5 text-ink opacity-40"></i>
                            <div class="flex-1 flex justify-between items-center pr-2"><h3 class="text-xl font-bold handwritten text-ink">${name}</h3><p class="text-[10px] font-bold text-red-500 uppercase tracking-tighter">${groupedChapters[name].length} Notes</p></div>
                        </div>`;
                });
            }
            if(typeof lucide !== 'undefined') lucide.createIcons();
        }

        function buildTopicCard(item) {
            const data = encodeURIComponent(JSON.stringify(item));
            return `<div onclick="openViewer('${data}')" class="flex items-center justify-between py-3 border-b border-ink/20 cursor-pointer group pr-2 ink-hover">
                    <h4 class="font-bold text-lg handwritten text-ink">${item.Topic}</h4>
                    <i data-lucide="arrow-right" class="w-4 h-4 text-ink opacity-50"></i>
                </div>`;
        }

        function openChapter(name) {
            try { history.pushState({view: 'topics', chapter: name, sub: currentSubject}, '', '#'+name); } catch(e){}
            performPageFlip('view-topics', () => {
                const heading = document.getElementById('chapterHeading');
                if(heading) heading.innerText = name;
                const list = document.getElementById('topicList');
                if(list) {
                    list.innerHTML = '';
                    if(groupedChapters[name]) groupedChapters[name].forEach(i => list.innerHTML += buildTopicCard(i));
                }
            });
        }

        function openViewer(jsonStr) {
            const item = JSON.parse(decodeURIComponent(jsonStr));
            try { history.pushState({view: 'image', topic: item, sub: currentSubject}, '', '#topic'); } catch(e){}
            performPageFlip('view-image', () => {
                const title = document.getElementById('imageTitle');
                if(title) title.innerText = item.Topic || "";
                
                const note = document.getElementById('imageNote');
                if(note) note.innerText = item.Short_Note || "";
                
                // Handle Multiple Images
                const container = document.getElementById('imageContainer');
                if(container) {
                    container.innerHTML = '';
                    // Split links by comma, space or pipe
                    let links = (item.ImageLink || "").split(/[,|\s]+/).map(l => l.trim()).filter(l => l);
                    
                    if(links.length > 0) {
                        links.forEach((link) => {
                            let embedLink = link;
                            if(embedLink.includes('drive.google.com')) {
                                const match = embedLink.match(/[-\w]{25,}/);
                                if(match) embedLink = `https://drive.google.com/file/d/${match[0]}/preview`;
                            }
                            // Create a taped photo frame for each link
                            container.innerHTML += `
                            <div class="taped-photo" onclick="openFullImage('${embedLink}')">
                                <div class="absolute inset-0 z-30 cursor-zoom-in"></div>
                                <iframe class="w-full h-[38vh] pointer-events-none border-none bg-white" src="${embedLink}"></iframe>
                            </div>`;
                        });
                    } else {
                        container.innerHTML = `<p class="text-sm opacity-50 italic text-ink mt-4">কোনো ছবি যুক্ত করা হয়নি</p>`;
                    }
                }
                
                const vBtn = document.getElementById('videoBtn');
                if(vBtn) {
                    if(item.Video_Link && item.Video_Link.startsWith('http')) { vBtn.href = item.Video_Link; vBtn.classList.remove('hidden'); vBtn.classList.add('flex'); } 
                    else { vBtn.classList.remove('flex'); vBtn.classList.add('hidden'); }
                }
            });
        }

        function goHome() {
            if(currentViewState === 'dashboard') return;
            const sInput = document.getElementById('searchInput');
            if(sInput) sInput.value = '';
            try { history.pushState({view: 'dashboard', sub: currentSubject}, '', `#${currentSubject}`); } catch(e){}
            performPageFlip('view-dashboard', renderDashboard, true);
        }
        
        window.addEventListener('popstate', function(event) {
            const viewer = document.getElementById('fullscreenViewer');
            if (viewer && viewer.style.display === 'flex') { closeFullImageUI(); return; }
            const state = event.state ? event.state.view : 'hub';
            if(state === 'hub') { goBackToDesk(); }
            else if (state === 'dashboard') {
                const sInput = document.getElementById('searchInput');
                if(sInput) sInput.value = '';
                performPageFlip('view-dashboard', renderDashboard, true);
            } 
            else if (state === 'topics') {
                const chapterName = event.state.chapter;
                performPageFlip('view-topics', () => {
                    const heading = document.getElementById('chapterHeading');
                    if(heading) heading.innerText = chapterName;
                    const list = document.getElementById('topicList');
                    if(list) {
                        list.innerHTML = '';
                        if(groupedChapters[chapterName]) groupedChapters[chapterName].forEach(i => list.innerHTML += buildTopicCard(i));
                    }
                }, true); 
            }
        });

        function performPageFlip(targetViewId, logicCallback, isBackward = false) {
            const page = document.getElementById('pageContent');
            if(!page) return;
            const outClass = isBackward ? 'flip-out-bwd' : 'flip-out-fwd';
            const inClass = isBackward ? 'flip-in-bwd' : 'flip-in-fwd';
            page.classList.remove('flip-out-fwd', 'flip-in-fwd', 'flip-out-bwd', 'flip-in-bwd');
            page.classList.add(outClass);
            setTimeout(() => {
                const d = document.getElementById('view-dashboard');
                const t = document.getElementById('view-topics');
                const i = document.getElementById('view-image');
                if(d) d.classList.add('hidden');
                if(t) t.classList.add('hidden');
                if(i) i.classList.add('hidden');
                if(logicCallback) logicCallback();
                const target = document.getElementById(targetViewId);
                if(target) target.classList.remove('hidden');
                page.classList.replace(outClass, inClass);
                currentViewState = targetViewId.replace('view-', '');
                setTimeout(() => { page.classList.remove(inClass); if(typeof lucide !== 'undefined') lucide.createIcons(); }, 300); 
            }, 300); 
        }

        function openFullImage(link) {
            if(link) {
                try { history.pushState({view: 'fullscreen'}, '', '#full'); } catch(e){}
                const viewer = document.getElementById('fullscreenViewer');
                const frame = document.getElementById('fullscreenFrame');
                if(frame) frame.src = link;
                if(viewer) viewer.style.display = 'flex';
            }
        }
        function closeFullImage() { history.back(); }
        function closeFullImageUI() { const viewer = document.getElementById('fullscreenViewer'); if(viewer) viewer.style.display = 'none'; }

        function executeSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            if(!q) { if(currentViewState !== 'dashboard') goHome(); else renderDashboard(); return; }
            const res = rawData.filter(i => i.Topic && i.Topic.toLowerCase().includes(q));
            if(currentViewState === 'dashboard') { renderDashboard(res); } 
            else { performPageFlip('view-dashboard', () => renderDashboard(res), true); }
        }

        window.onload = () => { if(typeof lucide !== 'undefined') lucide.createIcons(); try { history.replaceState({view: 'hub'}, '', '#hub'); } catch(e){} };
    </script>
</body>
</html>
