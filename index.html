<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>গণিত খাতা | BAcademy Ultra Realistic</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Hind+Siliguri:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            margin: 0; overflow: hidden;
            background-color: #2c1b18; 
            background-image: radial-gradient(circle at 50% 30%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.5) 100%),
                              url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            background-blend-mode: multiply;
        }

        .handwritten {
            font-family: 'Caveat', 'Hind Siliguri', cursive;
            font-style: italic; letter-spacing: -0.5px; color: #1e3a8a;
        }

        /* 1. 3D LEATHER BOOK COVER */
        .leather-cover {
            background-color: #1e293b; background-image: url('https://www.transparenttextures.com/patterns/leather.png');
            box-shadow: inset 4px 0 10px rgba(0,0,0,0.4), 20px 20px 40px rgba(0,0,0,0.8);
            border-radius: 4px 15px 15px 4px; border: 1.5px solid #334155;
            position: relative; transform-origin: left center;
            transition: transform 1s cubic-bezier(0.64, 0.04, 0.35, 1), opacity 0.6s ease;
            transform-style: preserve-3d;
        }
        .cover-open { transform: rotateY(-110deg); opacity: 0; pointer-events: none; }

        /* 2. REAL PAPER STACK (YELLOWISH) */
        .paper-stack {
            background-color: #fdf6e3; 
            background-image: repeating-linear-gradient(transparent, transparent 31px, #e2d7bf 31px, #e2d7bf 32px);
            background-attachment: local; border-radius: 2px 20px 20px 2px; border-left: 20px solid #1e293b;
            box-shadow: 1px 1px 0 #fff, 5px 5px 0 #d9cfb8, 20px 20px 40px rgba(0,0,0,0.6);
            height: 96vh; margin: 2vh auto; position: relative; overflow: hidden;
        }

        .paper-stack::before {
            content: ''; position: absolute; top: 0; bottom: 0; left: 45px; width: 2px;
            background-color: rgba(220, 38, 38, 0.4); z-index: 1; pointer-events: none;
        }
        .top-margin-line {
            position: absolute; top: 75px; left: 0; right: 0; height: 2px;
            background-color: rgba(220, 38, 38, 0.4); z-index: 50; pointer-events: none;
        }

        .home-btn-container { position: absolute; top: 15px; left: 8px; z-index: 100; }

        .page-content { 
            position: relative; z-index: 10; padding-left: 60px; padding-right: 15px; 
            height: 100%; overflow-y: auto; overflow-x: hidden;
        }
        
        .custom-header { display: flex; align-items: center; gap: 10px; padding-top: 5px; margin-bottom: 25px; }
        .search-container { flex: 1; position: relative; }
        .line-input { background: transparent; border: none; border-bottom: 1.5px solid #1e3a8a; color: #1e3a8a; width: 100%; outline: none; }

        /* TAPED PHOTO STYLE (No White/Polaroid Border) */
        .taped-photo {
            background: #ffffff; padding: 1px; /* Minimal frame edge */
            box-shadow: 3px 6px 15px rgba(0,0,0,0.3); border: none;
            transform: rotate(-1.5deg); margin: 35px auto 15px auto; width: 100%; max-width: 320px;
            position: relative;
        }
        /* Sticky Tape Effect (Non-transparent, solid matte white, positioned in the middle) */
        .taped-photo::before {
            content: ''; position: absolute;
            top: -15px; left: 50%; transform: translateX(-50%) rotate(2deg);
            width: 100px; height: 35px;
            background-color: #fdfdfd; /* Solid matte white */
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 1px 2px 4px rgba(0,0,0,0.1);
            z-index: 40;
            border-radius: 2px;
        }
        
        /* Full Screen Viewer */
        #fullscreenViewer {
            position: fixed; inset: 0; z-index: 700; background: rgba(0,0,0,0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Page Flip Animations */
        .flip-out-fwd { animation: flipOutF 0.3s forwards; transform-origin: left center; }
        .flip-in-fwd { animation: flipInF 0.3s forwards; transform-origin: left center; }
        .flip-out-bwd { animation: flipOutB 0.3s forwards; transform-origin: left center; }
        .flip-in-bwd { animation: flipInB 0.3s forwards; transform-origin: left center; }
        @keyframes flipOutF { to { transform: rotateY(-90deg); opacity: 0; } }
        @keyframes flipInF { from { transform: rotateY(90deg); opacity: 0; } to { transform: rotateY(0deg); opacity: 1; } }
        @keyframes flipOutB { to { transform: rotateY(90deg); opacity: 0; } }
        @keyframes flipInB { from { transform: rotateY(-90deg); opacity: 0; } to { transform: rotateY(0deg); opacity: 1; } }
    </style>
</head>
<body class="text-slate-900">

    <div id="tableOverlay" class="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900" style="background-image: url('https://images.unsplash.com/photo-1551269901-5c5e14c25df7?q=80&w=2069&auto=format&fit=crop'); background-size: cover; background-position: center;">
        <div class="absolute inset-0 bg-black/30"></div>
        <div id="mathBook" class="leather-cover w-full h-[75vh] max-w-[320px] flex flex-col justify-between p-8 cursor-pointer relative" onclick="openBook()">
            <div class="text-center mt-8">
                <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 border-[3px] border-[#fbbf24] bg-[#1e293b]">
                    <i data-lucide="calculator" class="w-8 h-8 text-[#fbbf24]"></i>
                </div>
                <h1 class="text-4xl font-extrabold text-[#fbbf24] tracking-tight uppercase">গণিত খাতা</h1>
                <p class="text-white font-bold mt-2 tracking-[0.2em] opacity-80 text-[10px] uppercase"></p>
                <div class="mt-8 px-2">
                    <p class="text-blue-100 italic text-[11px] leading-relaxed opacity-70 handwritten">
                        "পরিশ্রম সৌভাগ্যের প্রসূতি"
                    </p>
                </div>
            </div>
            <div class="text-center">
                <button class="bg-[#fbbf24] text-slate-900 px-6 py-2.5 rounded-md font-extrabold shadow-xl mb-4">খাতা খুলুন</button>
                <p class="text-white/50 text-[10px] tracking-widest font-mono uppercase">© বিলাস ২০২৬</p>
            </div>
        </div>
    </div>

    <div id="fullscreenViewer">
        <button onclick="closeFullImage()" class="absolute top-5 right-5 text-white bg-white/20 p-2 rounded-full"><i data-lucide="x"></i></button>
        <iframe id="fullscreenFrame" class="w-[98%] h-[85%] rounded-lg bg-white" src=""></iframe>
    </div>

    <div id="mainApp" class="hidden max-w-2xl mx-auto w-[96%] paper-stack">
        <div class="top-margin-line"></div>

        <div class="home-btn-container">
            <button onclick="goHome()" class="text-red-500/70 hover:text-red-600 transition-colors p-2">
                <i data-lucide="home" class="w-7 h-7"></i>
            </button>
        </div>

        <div id="pageContent" class="page-content no-scrollbar">
            <header class="sticky top-0 z-40 bg-[#fdf6e3]/95 pt-4">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold handwritten flex items-center gap-2">
                        <i data-lucide="pen-tool" class="text-red-600 w-5 h-5"></i> Math Notes
                    </h2>
                    <button onclick="loadDataManually()" class="text-blue-900 opacity-60"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
                </div>

                <div class="custom-header">
                    <div id="backBtnContainer" class="hidden">
                        <button onclick="navigateBack()" class="flex items-center gap-1 handwritten font-bold text-red-600 px-2 py-1">
                            <i data-lucide="corner-down-left" class="w-4 h-4"></i> পাতা উল্টান
                        </button>
                    </div>
                    <div id="placeholder" class="w-16"></div>
                    <div class="search-container">
                        <input type="text" id="searchInput" oninput="executeSearch()" placeholder="টপিক খুঁজুন..." class="handwritten line-input text-base focus:outline-none">
                        <i data-lucide="search" class="absolute right-0 top-0.5 text-blue-300 w-4 h-4"></i>
                    </div>
                </div>
            </header>

            <main class="pb-24">
                <div id="loader" class="hidden flex flex-col items-center justify-center py-10">
                    <i data-lucide="loader" class="w-8 h-8 animate-spin text-blue-600"></i>
                    <p class="text-xs font-bold mt-2">ডেটা লোড হচ্ছে...</p>
                </div>
                <div id="view-dashboard" class="flex flex-col mt-4"></div>
                <div id="view-topics" class="hidden flex flex-col">
                    <h2 id="chapterHeading" class="text-2xl font-bold handwritten border-b-2 border-red-400/30 mb-4 inline-block mt-2"></h2>
                    <div id="topicList" class="flex flex-col"></div>
                </div>
                <div id="view-image" class="hidden flex flex-col items-center">
                    <h3 id="imageTitle" class="w-full text-xl font-bold handwritten mb-3 leading-tight text-center"></h3>
                    
                    <div class="taped-photo" onclick="openFullImage()">
                        <div class="absolute inset-0 z-30 cursor-zoom-in"></div>
                        <iframe id="driveFrame" class="w-full h-[38vh] pointer-events-none border-none" src=""></iframe>
                    </div>
                    
                    <p id="imageNote" class="text-center mt-3 handwritten text-xs font-bold opacity-80 italic px-2 leading-relaxed"></p>
                    
                    <div class="mt-10 w-full px-4">
                        <a id="videoBtn" href="#" target="_blank" class="hidden items-center justify-center gap-3 bg-red-600 text-white py-3 rounded-full text-base font-bold shadow-lg transform active:scale-95 transition-all">
                            <i data-lucide="play-circle" class="w-6 h-6"></i> ভিডিও ক্লাস দেখুন
                        </a>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Google Sheet CSV URL
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWvEMlB8yjZ96rWKGPmXIevhTjaFZ_SuLb_42IGHdRNAcljvveIJAPnSHlz13tu6wyr1X8D3lYUxJm/pub?gid=566628590&single=true&output=csv";
        
        let rawData = [], groupedChapters = {}, currentViewState = 'dashboard';

        function openBook() {
            document.getElementById('mathBook').classList.add('cover-open'); 
            setTimeout(() => {
                document.getElementById('tableOverlay').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                history.replaceState({view: 'dashboard'}, '', '#dashboard');
                loadDataManually(); 
            }, 800);
        }

        // ক্রোম ব্রাউজারের CORS পলিসি বাইপাস করার জন্য সরাসরি XMLHttpRequest ব্যবহার
        function loadDataManually() {
            document.getElementById('loader').classList.replace('hidden', 'flex');
            var xhr = new XMLHttpRequest();
            // Cache buster adds timestamp to prevent caching issues
            xhr.open("GET", GOOGLE_SHEET_CSV_URL + "&cache=" + new Date().getTime(), true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState == 4) {
                    document.getElementById('loader').classList.replace('flex', 'hidden');
                    if (xhr.status == 200) {
                        parseCSV(xhr.responseText);
                    } else {
                        document.getElementById('loader').innerHTML = "<p class='text-red-500 font-bold handwritten'>ডেটা লোড হতে পারছে না। ব্রাউজার রিফ্রেশ করুন।</p>";
                    }
                }
            };
            xhr.send();
        }

        function parseCSV(text) {
            let lines = text.split("\n");
            // Handle header and remove potential quotes/spaces
            let headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ''));
            
            rawData = [];
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim() == "") continue;
                let obj = {};
                // Simple CSV split (handles quotes if data fields aren't complex)
                let currentline = lines[i].split(",").map(c => c.trim().replace(/^"|"$/g, ''));
                if (currentline.length < 2) continue;
                headers.forEach((h, idx) => {
                    obj[h] = currentline[idx];
                });
                rawData.push(obj);
            }
            processData();
        }

        function processData() {
            groupedChapters = {};
            rawData.forEach(item => {
                if (!groupedChapters[item.Chapter]) groupedChapters[item.Chapter] = [];
                groupedChapters[item.Chapter].push(item);
            });
            renderDashboard();
        }

        function renderDashboard(list = null) {
            const container = document.getElementById('view-dashboard');
            container.innerHTML = '';
            if (list) {
                list.forEach(item => container.innerHTML += buildTopicCard(item));
            } else {
                Object.keys(groupedChapters).forEach(name => {
                    container.innerHTML += `
                        <div onclick="openChapter('${name}')" class="flex items-center gap-3 py-3 border-b border-blue-200/30 cursor-pointer group ink-hover">
                            <i data-lucide="book" class="w-5 h-5 text-blue-400 opacity-40"></i>
                            <div class="flex-1 flex justify-between items-center pr-2"><h3 class="text-xl font-bold handwritten">${name}</h3><p class="text-[10px] font-bold text-red-400 uppercase tracking-tighter">${groupedChapters[name].length} Notes</p></div>
                        </div>`;
                });
            }
            lucide.createIcons();
        }

        function buildTopicCard(item) {
            const data = encodeURIComponent(JSON.stringify(item));
            return `<div onclick="openViewer('${data}')" class="flex items-center justify-between py-3 border-b border-blue-200/30 cursor-pointer group pr-2 ink-hover">
                    <h4 class="font-bold text-lg handwritten">${item.Topic}</h4>
                    <i data-lucide="arrow-right" class="w-4 h-4 text-blue-200"></i>
                </div>`;
        }

        function openChapter(name) {
            // Push topics state with backward true since we are going deeper
            history.pushState({view: 'topics', chapter: name}, '', '#'+name);
            performPageFlip('view-topics', () => {
                document.getElementById('chapterHeading').innerText = name;
                document.getElementById('topicList').innerHTML = '';
                groupedChapters[name].forEach(i => document.getElementById('topicList').innerHTML += buildTopicCard(i));
            });
        }

        function openViewer(jsonStr) {
            const item = JSON.parse(decodeURIComponent(jsonStr));
            history.pushState({view: 'image', topic: item}, '', '#topic');
            performPageFlip('view-image', () => {
                document.getElementById('imageTitle').innerText = item.Topic;
                document.getElementById('imageNote').innerText = item.Short_Note || "";
                let link = item.ImageLink;
                if(link.includes('drive.google.com')) {
                    const match = link.match(/[-\w]{25,}/);
                    if(match) link = `https://drive.google.com/file/d/${match[0]}/preview`;
                }
                document.getElementById('driveFrame').src = link;
                document.getElementById('fullscreenFrame').src = link;
                const vBtn = document.getElementById('videoBtn');
                if(item.Video_Link && item.Video_Link.startsWith('http')) {
                    vBtn.href = item.Video_Link;
                    vBtn.classList.replace('hidden', 'flex');
                } else {
                    vBtn.classList.replace('flex', 'hidden');
                }
            });
        }

        function goHome() {
            if(currentViewState === 'dashboard') return;
            document.getElementById('searchInput').value = '';
            // Reset search view, chapter view and topics view state.
            history.pushState({view: 'dashboard'}, '', '#dashboard');
            performPageFlip('view-dashboard', renderDashboard, true);
        }

        function navigateBack() {
            history.back();
        }
        
        // Handle physical/browser back button for real page flip transitions
        window.addEventListener('popstate', function(event) {
            // Check if full screen is open, close it first
            if (document.getElementById('fullscreenViewer').style.display === 'flex') {
                closeFullImageUI();
                return;
            }
            // Decide backward flip destination based on history state
            const state = event.state ? event.state.view : 'dashboard';
            if (state === 'dashboard') {
                document.getElementById('searchInput').value = ''; // Reset search.
                performPageFlip('view-dashboard', renderDashboard, true); // Backward flip.
            } else if (state === 'topics') {
                // Topic state stores the chapter name
                const chapterName = event.state.chapter;
                performPageFlip('view-topics', () => {
                    document.getElementById('chapterHeading').innerText = chapterName;
                    document.getElementById('topicList').innerHTML = '';
                    groupedChapters[chapterName].forEach(i => document.getElementById('topicList').innerHTML += buildTopicCard(i));
                }, true); // Backward flip from image view back to topics for chapter.
            } else if (state === 'image') {
                 // Going back from fullscreen photo? Image state is already correct.
            }
        });

        function performPageFlip(targetViewId, logicCallback, isBackward = false) {
            const page = document.getElementById('pageContent');
            const outClass = isBackward ? 'flip-out-bwd' : 'flip-out-fwd';
            const inClass = isBackward ? 'flip-in-bwd' : 'flip-in-fwd';
            
            page.classList.remove('flip-out-fwd', 'flip-in-fwd', 'flip-out-bwd', 'flip-in-bwd');
            page.classList.add(outClass);
            
            setTimeout(() => {
                document.getElementById('view-dashboard').classList.add('hidden');
                document.getElementById('view-topics').classList.add('hidden');
                document.getElementById('view-image').classList.add('hidden');
                
                if(logicCallback) logicCallback();
                
                document.getElementById(targetViewId).classList.remove('hidden');
                document.getElementById('backBtnContainer').classList.toggle('hidden', targetViewId === 'view-dashboard');
                document.getElementById('placeholder').classList.toggle('hidden', targetViewId !== 'view-dashboard');
                
                page.classList.replace(outClass, inClass);
                currentViewState = targetViewId.replace('view-', '');
                setTimeout(() => { page.classList.remove(inClass); lucide.createIcons(); }, 300); 
            }, 300); 
        }

        function openFullImage() {
            history.pushState({view: 'fullscreen'}, '', '#full');
            document.getElementById('fullscreenViewer').style.display = 'flex';
        }
        function closeFullImage() { history.back(); }
        function closeFullImageUI() { document.getElementById('fullscreenViewer').style.display = 'none'; }

        function executeSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            // If search is cleared, reset dashboard chapter list
            if(!q) { if(currentViewState !== 'dashboard') history.back(); else renderDashboard(); return; }
            const res = rawData.filter(i => i.Topic.toLowerCase().includes(q));
            // Render on dashboard view, hiding chapter list
            document.getElementById('searchInput').value = q; // Preserve query in input.
            // Flip but render on dashboard.
            if(currentViewState === 'dashboard') {
               renderDashboard(res); 
            } else {
               performPageFlip('view-dashboard', () => renderDashboard(res), true); 
            }
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
