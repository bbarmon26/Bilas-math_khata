<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সন্ধি মাস্টার - আল্টিমেট প্রো</title>
    <style>
        /* Modern Animated Background for Sandhi */
        body {
            font-family: 'Kalpurush', 'SolaimanLipi', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(-45deg, #2b1055, #753a88, #4b134f, #1f0b3b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            scroll-behavior: smooth;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Main Container */
        .glass-panel {
            background: rgba(20, 10, 40, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            max-width: 850px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            position: relative;
            margin-bottom: 50px;
        }

        h2 {
            text-align: center;
            font-size: 32px;
            background: linear-gradient(to right, #d4fc79, #96e6a1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 2px dashed rgba(255,255,255,0.2);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        
        /* Toolbar Styles */
        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .search-box {
            flex-grow: 1;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.4);
            color: #fff;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .search-box:focus {
            border-color: #96e6a1;
            background: rgba(0,0,0,0.6);
            box-shadow: 0 0 15px rgba(150, 230, 161, 0.4);
        }
        .btn {
            background: linear-gradient(135deg, #d4fc79, #96e6a1);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(150, 230, 161, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(150, 230, 161, 0.6);
        }

        /* Item Styles */
        .sandhi-item {
            margin-bottom: 20px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            scroll-margin-top: 100px;
        }
        .sandhi-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #96e6a1;
            transform: scale(1.01);
        }
        .sandhi-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        .serial {
            color: #96e6a1;
            font-weight: bold;
            font-size: 22px;
            min-width: 45px;
        }
        .sandhi-word {
            flex-grow: 1;
            background: rgba(150, 230, 161, 0.15);
            border-bottom: 2px dashed #96e6a1;
            padding: 5px 15px;
            border-radius: 8px;
            cursor: pointer;
            color: #d4fc79;
            transition: 0.3s;
            font-weight: bold;
            font-size: 24px;
            text-align: center;
            letter-spacing: 1px;
        }
        .sandhi-word:hover {
            background: #96e6a1;
            color: #000;
        }
        .answer {
            display: none;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: #000;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 22px;
            animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.4);
        }
        
        /* Floating Right Navigator */
        .right-nav {
            position: fixed;
            right: 30px;
            bottom: 30px;
            background: rgba(20, 10, 40, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden; 
            width: 65px;
            height: 65px;
        }
        .right-nav.expanded {
            border-radius: 25px;
            width: 70px;
            height: 290px;
            padding-top: 15px;
            padding-bottom: 10px;
            cursor: default;
        }
        .rocket-toggle {
            font-size: 30px;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 65px;
        }
        .nav-panel-contents {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transition: opacity 0.3s ease;
            height: 0;
            pointer-events: none;
        }
        .right-nav.expanded .nav-panel-contents {
            opacity: 1;
            height: auto;
            pointer-events: auto;
            margin-bottom: 5px;
        }
        .jump-input {
            width: 40px;
            padding: 8px 5px;
            border-radius: 8px;
            border: 1px solid #96e6a1;
            background: rgba(0,0,0,0.5);
            color: #fff;
            text-align: center;
            outline: none;
        }
        .jump-btn {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.8) translateY(-10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .fav-icon {
            cursor: pointer;
            font-size: 26px;
            color: rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .fav-icon.active {
            color: #f6d365;
            text-shadow: 0 0 15px rgba(246, 211, 101, 0.8);
        }

        @media (max-width: 768px) {
            .glass-panel { padding: 20px; }
            .right-nav { right: 20px; bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h2>✨ সন্ধি মাস্টার 📚</h2>
        
        <div class="toolbar">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 সন্ধির শব্দ খুঁজুন..." onkeyup="filterItems()">
            <button class="btn" id="favToggleBtn" onclick="toggleFavView()">⭐ ফেভারিটগুলো</button>
            <button class="btn" onclick="scrollToLastRead()">🕒 শেষ পড়া স্থানে যান</button>
        </div>

        <div id="no-results" style="display:none; text-align:center;">কোনো ফলাফল পাওয়া যায়নি!</div>
        <div id="sandhi-container"></div>
    </div>

    <div class="right-nav" id="rightNav" onclick="toggleNavPanel(event)">
        <div class="nav-panel-contents">
            <button style="background:none; border:none; cursor:pointer; font-size:20px;" onclick="window.scrollTo(0,0)">⬆️</button>
            <div style="display:flex; flex-direction:column; gap:5px; align-items:center;">
                <input type="number" id="jumpInput" class="jump-input" placeholder="নং">
                <button class="jump-btn" onclick="jumpToQuestion()">যান</button>
            </div>
            <button style="background:none; border:none; cursor:pointer; font-size:20px;" onclick="window.scrollTo(0, document.body.scrollHeight)">⬇️</button>
        </div>
        <div class="rocket-toggle">🚀</div>
    </div>

        function renderItems(filterText = "") {
            container.innerHTML = "";
            let count = 0;
            sandhiData.forEach((item, index) => {
                const textForSearch = item.word.toLowerCase() + " " + item.sandhi.toLowerCase();
                const isMatch = textForSearch.includes(filterText.toLowerCase());

                if (isMatch && (!showOnlyFavs || isFav)) {
                    count++;
                    const div = document.createElement('div');
                    div.className = 'sandhi-item';

                        </div>
                        <div class="answer">
                            ${item.sandhi}
                        </div>
                    `;
                    container.appendChild(div);
                }
            });
            document.getElementById('no-results').style.display = count === 0 ? "block" : "none";
        }

        function showAnswer(element, index) {
            const answerDiv = element.parentElement.nextElementSibling;
            if (answerDiv.style.display === "block") {
                answerDiv.style.display = "none";
                element.style.background = "rgba(150, 230, 161, 0.15)";
                element.style.color = "#d4fc79";
            } else {
                answerDiv.style.display = "block";
                element.style.background = "#96e6a1";
                element.style.color = "#000";
                localStorage.setItem('sandhiLastRead', index + 1);
            }
        }

            const favIndex = favorites.indexOf(index);
            if (favIndex === -1) { favorites.push(index); element.classList.add('active'); }
            else { favorites.splice(favIndex, 1); element.classList.remove('active'); if(showOnlyFavs) renderItems(); }
            localStorage.setItem('sandhiFavs', JSON.stringify(favorites));
        }

        function filterItems() { renderItems(document.getElementById('searchInput').value); }

        function toggleFavView() {
            showOnlyFavs = !showOnlyFavs;
            document.getElementById('favToggleBtn').innerHTML = showOnlyFavs ? "📖 সবগুলো দেখুন" : "⭐ ফেভারিটগুলো";
            renderItems();
        }

        function scrollToLastRead() {
            const lastRead = localStorage.getItem('sandhiLastRead');
            if (lastRead) jumpToElement(lastRead);
            else alert("কোনো লাস্ট রিড ডেটা নেই!");
        }

        function jumpToQuestion() {
            const num = parseInt(document.getElementById('jumpInput').value);
            if(num > 0 && num <= sandhiData.length) jumpToElement(num);
            else alert("সঠিক নম্বর দিন!");
        }

        function jumpToElement(id) {
            const el = document.getElementById(`item-${id}`);
            if(el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.style.borderLeft = "4px solid #96e6a1";
                setTimeout(() => { el.style.borderLeft = "4px solid transparent"; }, 2000);
            }
        }

        function toggleNavPanel(e) {
            if(e.target.closest('.rocket-toggle') || e.target.id === 'rightNav') {
                document.getElementById('rightNav').classList.toggle('expanded');
            }
        }

        renderItems();
    </script>
</body>
</html>
