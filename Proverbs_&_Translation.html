    <style>

        :root {
            --bg-color: #0f172a;

            --text-main: #f8fafc;

            --primary-accent: #3b82f6;

            --translation-badge: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hind Siliguri', 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 2rem;
            color: var(--primary-accent);
            margin-bottom: 5px;
            font-family: 'Poppins', sans-serif;
        }

        /* Search Bar Styles */
        .search-container {
            text-align: center;
            margin-bottom: 25px;
        }

        #searchInput {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: var(--card-bg);
            color: var(--text-main);
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        #searchInput::placeholder {
            color: #64748b;
        }

        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nav-btn {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 2px solid #334155;
            padding: 10px 25px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-weight: 600;
        }

        .nav-btn.active, .nav-btn:hover {
            background-color: var(--primary-accent);
            border-color: var(--primary-accent);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        /* Views */
        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        /* Card Styles */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            border: 1px solid #334155;
            transition: transform 0.2s, border-color 0.3s;
            position: relative;
        }

        .card:hover {
            border-color: #475569;
        }

        .badge {
            position: absolute;
            top: -10px;
            left: 20px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            color: #fff;
        }

        .badge.proverb { background-color: var(--proverb-badge); }
        .badge.translation { background-color: var(--translation-badge); }

        .bn-text {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f8fafc;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .en-text {
            font-size: 1.3rem;
            color: #e2e8f0;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            border-left: 4px solid var(--primary-accent);
            padding-left: 15px;
            background: rgba(59, 130, 246, 0.05);
            padding-top: 8px;
            padding-bottom: 8px;
            border-radius: 0 8px 8px 0;
        }

        /* Practice Mode Specifics */
        .practice-card {
            cursor: pointer;
        }
        
        .practice-card::after {
            content: '▼ ইংরেজি দেখুন';
            position: absolute;
            right: 20px;
            top: 25px;
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 500;
        }

        .practice-card.open::after {
            content: '▲ লুকান';
        }

        .hidden-details {
            display: none;
            margin-top: 15px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .practice-card.open .hidden-details {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-result {
            text-align: center;
            color: #94a3b8;
            font-size: 1.2rem;
            margin-top: 30px;
        }

    </style>
</head>

    const studyContainer = document.getElementById('study-view');
    const practiceContainer = document.getElementById('practice-view');

    // ডাটা থেকে HTML জেনারেট করা
    function renderApp(dataArray) {
        let studyHTML = '';
        let practiceHTML = '';

        if (dataArray.length === 0) {
            studyHTML = '<div class="no-result">কোনো ফলাফল পাওয়া যায়নি! 😞</div>';
            practiceHTML = '<div class="no-result">কোনো ফলাফল পাওয়া যায়নি! 😞</div>';
        } else {
            dataArray.forEach((item) => {
                const badgeClass = item.type === "Proverb" ? "proverb" : "translation";

                // Study Mode Card
                studyHTML += `
                    <div class="card">
                        <span class="badge ${badgeClass}">${item.type}</span>
                        <div class="bn-text">${item.n}. ${item.bn}</div>
                        <div class="en-text">${item.en}</div>
                    </div>
                `;

                // Practice Mode Card
                practiceHTML += `
                    <div class="card practice-card" onclick="togglePracticeCard(this)">
                        <span class="badge ${badgeClass}">${item.type}</span>
                        <div class="bn-text">${item.n}. ${item.bn}</div>
                        <div class="hidden-details">
                            <div class="en-text">${item.en}</div>
                        </div>
                    </div>
                `;
            });
        }

        studyContainer.innerHTML = studyHTML;
        practiceContainer.innerHTML = practiceHTML;
    }

    // Search Function
    function searchData() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        
        const filteredData = appData.filter(item => {
            return item.bn.toLowerCase().includes(query) || 
                   item.en.toLowerCase().includes(query) ||
                   item.type.toLowerCase().includes(query);
        });

        renderApp(filteredData);
    }

    // Tab Change Function
    function switchTab(tabId) {
        document.querySelectorAll('.view-section').forEach(section => {
            section.classList.remove('active');
        });
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.remove('active');
        });

        if(tabId === 'study') {
            document.getElementById('study-view').classList.add('active');
            document.querySelectorAll('.nav-btn')[0].classList.add('active');
        } else {
            document.getElementById('practice-view').classList.add('active');
            document.querySelectorAll('.nav-btn')[1].classList.add('active');
        }
    }

    // Toggle Answer in Practice Mode
    function togglePracticeCard(element) {
        element.classList.toggle('open');
    }

    // অ্যাপ চালু করার সময় সব ডেটা দেখাবে
    renderApp(appData);
</script>
