<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সমাস মাস্টার - আল্টিমেট প্রো</title>
    <style>
        /* Modern Animated Background */
        body {
            font-family: 'Kalpurush', 'SolaimanLipi', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(-45deg, #141e30, #243b55, #4b6cb7, #182848);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            scroll-behavior: smooth;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Main Container */
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            max-width: 850px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            margin-bottom: 50px;
        }

        h2 {
            text-align: center;
            font-size: 32px;
            background: linear-gradient(to right, #ff9966, #ff5e62);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 2px dashed rgba(255,255,255,0.2);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        
        /* Toolbar Styles */
        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .search-box {
            flex-grow: 1;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.4);
            color: #fff;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .search-box:focus {
            border-color: #ff9966;
            background: rgba(0,0,0,0.6);
            box-shadow: 0 0 15px rgba(255, 153, 102, 0.4);
        }
        .btn {
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 94, 98, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 94, 98, 0.6);
        }

        /* Item Styles */
        .samas-item {
            margin-bottom: 20px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            scroll-margin-top: 100px;
        }
        .samas-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-left: 4px solid #ff9966;
            transform: scale(1.01);
        }
        .samas-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        .serial {
            color: #ff9966;
            font-weight: bold;
            font-size: 22px;
            min-width: 45px;
        }
        .samas-word {
            flex-grow: 1;
            background: rgba(255, 153, 102, 0.15);
            border-bottom: 2px dashed #ff9966;
            padding: 5px 15px;
            border-radius: 8px;
            cursor: pointer;
            color: #ffcc99;
            transition: 0.3s;
            font-weight: bold;
            font-size: 22px;
            text-align: center;
        }
        .samas-word:hover {
            background: #ff9966;
            color: #000;
        }
        .answer {
            display: none;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: #000;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 18px;
            animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
            line-height: 1.6;
        }
        
        /* Floating Right Navigator */
        .right-nav {
            position: fixed;
            right: 30px;
            bottom: 30px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden; 
            width: 65px;
            height: 65px;
        }
        .right-nav.expanded {
            border-radius: 25px;
            width: 70px;
            height: 290px;
            padding-top: 15px;
            padding-bottom: 10px;
            cursor: default;
        }
        .rocket-toggle {
            font-size: 30px;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 65px;
        }
        .nav-panel-contents {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transition: opacity 0.3s ease;
            height: 0;
            pointer-events: none;
        }
        .right-nav.expanded .nav-panel-contents {
            opacity: 1;
            height: auto;
            pointer-events: auto;
            margin-bottom: 5px;
        }
        .jump-input {
            width: 40px;
            padding: 8px 5px;
            border-radius: 8px;
            border: 1px solid #ff9966;
            background: rgba(0,0,0,0.5);
            color: #fff;
            text-align: center;
            outline: none;
        }
        .jump-btn {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.8) translateY(-10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .fav-icon {
            cursor: pointer;
            font-size: 26px;
            color: rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .fav-icon.active {
            color: #f6d365;
        }

        @media (max-width: 768px) {
            .glass-panel { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h2>✨ সমাস মাস্টার 📚</h2>
        
        <div class="toolbar">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 সমস্ত পদ বা সমাস খুঁজুন..." onkeyup="filterItems()">
            <button class="btn" id="favToggleBtn" onclick="toggleFavView()">⭐ ফেভারিটগুলো</button>
            <button class="btn" onclick="scrollToLastRead()">🕒 শেষ পড়া স্থানে যান</button>
        </div>

        <div id="no-results" style="display:none; text-align:center;">কোনো ফলাফল পাওয়া যায়নি!</div>
        <div id="samas-container"></div>
    </div>

    <div class="right-nav" id="rightNav" onclick="toggleNavPanel(event)">
        <div class="nav-panel-contents">
            <button style="background:none; border:none; cursor:pointer; font-size:20px;" onclick="window.scrollTo(0,0)">⬆️</button>
            <div style="display:flex; flex-direction:column; gap:5px; align-items:center;">
                <input type="number" id="jumpInput" class="jump-input" placeholder="নং">
                <button class="jump-btn" onclick="jumpToQuestion()">যান</button>
            </div>
            <button style="background:none; border:none; cursor:pointer; font-size:20px;" onclick="window.scrollTo(0, document.body.scrollHeight)">⬇️</button>
        </div>
        <div class="rocket-toggle">🚀</div>
    </div>

        let favorites = JSON.parse(localStorage.getItem('samasFavs')) || [];
        let showOnlyFavs = false;
        const container = document.getElementById('samas-container');

        function renderItems(filterText = "") {
            container.innerHTML = "";
            let count = 0;
            samasData.forEach((item, index) => {
                const textForSearch = item.word.toLowerCase() + " " + item.samas.toLowerCase();
                const isMatch = textForSearch.includes(filterText.toLowerCase());
                const isFav = favorites.includes(index);
                if (isMatch && (!showOnlyFavs || isFav)) {
                    count++;
                    const div = document.createElement('div');
                    div.className = 'samas-item';
                    div.id = `item-${index + 1}`;
                    div.innerHTML = `
                        <div class="samas-header">
                            <span class="serial">${index + 1}.</span> 
                            <div class="samas-word" onclick="showAnswer(this, ${index})">${item.word}</div>
                            <span class="fav-icon ${isFav ? 'active' : ''}" onclick="toggleFavorite(${index}, this)">★</span>
                        </div>
                        <div class="answer">
                            <b>ব্যাসবাক্য:</b> ${item.byasbakya} <br>
                            <b>সমাস:</b> ${item.samas}
                        </div>
                    `;
                    container.appendChild(div);
                }
            });
            document.getElementById('no-results').style.display = count === 0 ? "block" : "none";
        }

        function showAnswer(element, index) {
            const answerDiv = element.parentElement.nextElementSibling;
            answerDiv.style.display = answerDiv.style.display === "block" ? "none" : "block";
            if(answerDiv.style.display === "block") {
                localStorage.setItem('samasLastRead', index + 1);
            }
        }

        function toggleFavorite(index, element) {
            const favIndex = favorites.indexOf(index);
            if (favIndex === -1) { favorites.push(index); element.classList.add('active'); }
            else { favorites.splice(favIndex, 1); element.classList.remove('active'); if(showOnlyFavs) renderItems(); }
            localStorage.setItem('samasFavs', JSON.stringify(favorites));
        }

        function filterItems() { renderItems(document.getElementById('searchInput').value); }

        function toggleFavView() {
            showOnlyFavs = !showOnlyFavs;
            document.getElementById('favToggleBtn').innerHTML = showOnlyFavs ? "📖 সবগুলো দেখুন" : "⭐ ফেভারিটগুলো";
            renderItems();
        }

        function scrollToLastRead() {
            const lastRead = localStorage.getItem('samasLastRead');
            if (lastRead) jumpToElement(lastRead);
            else alert("কোনো লাস্ট রিড ডেটা নেই!");
        }

        function jumpToQuestion() {
            const num = parseInt(document.getElementById('jumpInput').value);
            if(num > 0 && num <= samasData.length) jumpToElement(num);
            else alert("সঠিক নম্বর দিন!");
        }

        function jumpToElement(id) {
            const el = document.getElementById(`item-${id}`);
            if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function toggleNavPanel(e) {
            if(e.target.closest('.rocket-toggle') || e.target.id === 'rightNav') {
                document.getElementById('rightNav').classList.toggle('expanded');
            }
        }
