        :root {

            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;

        }

            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Hind Siliguri', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 2rem;
            color: var(--primary-accent);
            margin-bottom: 5px;
        }

        /* Search Bar Styles */
        .search-container {
            text-align: center;
            margin-bottom: 25px;
        }

        #searchInput {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: var(--card-bg);
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        #searchInput::placeholder {
            color: #64748b;
        }

        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nav-btn {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 2px solid #334155;
            padding: 10px 25px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-weight: 600;
        }

        .nav-btn.active, .nav-btn:hover {
            background-color: var(--primary-accent);
            border-color: var(--primary-accent);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        /* Views */
        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        /* Card Styles */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            border: 1px solid #334155;
            transition: transform 0.2s, border-color 0.3s;
        }

        .card:hover {
            border-color: #475569;
        }

        .idiom-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .meaning-line {
            font-size: 1.3rem;
            color: #e2e8f0;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .pronunciation-line {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .example-box {
            border-left: 5px solid var(--primary-accent);
            padding-left: 15px;
            margin-top: 10px;
            font-style: italic;
            color: #cbd5e1;
            font-size: 1.2rem;
            background: rgba(59, 130, 246, 0.05);
            padding-top: 8px;
            padding-bottom: 8px;
            border-radius: 0 8px 8px 0;
        }

        /* Practice Mode Specifics */
        .practice-card {
            cursor: pointer;
            position: relative;
        }
        
        .practice-card::after {
            content: '▼ চাপ দিন';
            position: absolute;
            right: 20px;
            top: 30px;
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 500;
        }

        .practice-card.open::after {
            content: '▲ লুকান';
        }

        .hidden-details {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #475569;
            animation: fadeIn 0.3s ease-in-out;
        }

        .practice-card.open .hidden-details {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-result {
            text-align: center;
            color: #94a3b8;
            font-size: 1.2rem;
            margin-top: 30px;
        }

</head>

        // ডাটা থেকে HTML জেনারেট করা (সার্চ রেজাল্ট অনুযায়ী)
    function renderApp(dataArray) {
        let studyHTML = '';
        let practiceHTML = '';

        if (dataArray.length === 0) {
            studyHTML = '<div class="no-result">কোনো ফলাফল পাওয়া যায়নি! 😞</div>';
            practiceHTML = '<div class="no-result">কোনো ফলাফল পাওয়া যায়নি! 😞</div>';
        } else {
            dataArray.forEach((item, index) => {
                const color = titleColors[index % titleColors.length];

                // এখানেই উচ্চারণ (idiomPron) এবং নতুন উদাহরণ যোগ করা হয়েছে
                const detailsHTML = `
                    <div class="pronunciation-line" style="color: #94a3b8; font-size: 1.1rem; margin-bottom: 5px;">
                        <strong>উচ্চারণ:</strong> ${item.idiomPron}
                    </div>
                    <div class="meaning-line">${item.meaningEn} - ${item.meaningBn}</div>
                    <div class="example-box">
                        <strong>Ex:</strong> ${item.exampleEn} <br>
                        <span style="font-size: 1.1rem; color: #94a3b8;">(${item.exampleBn})</span>
                    </div>
                `;

                studyHTML += `
                    <div class="card">
                        <div class="idiom-title" style="color: ${color}">${item.number}. ${item.idiom}</div>
                        <div>${detailsHTML}</div>
                    </div>
                `;

                practiceHTML += `
                    <div class="card practice-card" onclick="togglePracticeCard(this)">
                        <div class="idiom-title" style="color: ${color}">${item.number}. ${item.idiom}</div>
                        <div class="hidden-details">
                            ${detailsHTML}
                        </div>
                    </div>
                `;
            });
        }

        studyContainer.innerHTML = studyHTML;
        practiceContainer.innerHTML = practiceHTML;
    }

    }

    // Search Function
    function searchIdioms() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        
        const filteredData = idiomsData.filter(item => {
            return item.idiom.toLowerCase().includes(query) || 
                   item.meaningEn.toLowerCase().includes(query) || 
                   item.meaningBn.includes(query);
        });

        renderApp(filteredData);
    }

    // Tab Change Function
    function switchTab(tabId) {
        document.querySelectorAll('.view-section').forEach(section => {
            section.classList.remove('active');
        });
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.remove('active');
        });

        if(tabId === 'study') {
            document.getElementById('study-view').classList.add('active');
            document.querySelectorAll('.nav-btn')[0].classList.add('active');
        } else {
            document.getElementById('practice-view').classList.add('active');
            document.querySelectorAll('.nav-btn')[1].classList.add('active');
        }
    }

    // Toggle Answer in Practice Mode
    function togglePracticeCard(element) {
        element.classList.toggle('open');
    }

    // অ্যাপ চালু করার সময় সব ডেটা দেখাবে
    renderApp(idiomsData);
</script>
