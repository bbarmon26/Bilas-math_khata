<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কারক ও বিভক্তি মাস্টার - আল্টিমেট প্রো</title>
    <style>
        /* Modern Animated Background */
        body {
            font-family: 'Kalpurush', 'SolaimanLipi', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1f1c2c, #928dab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            scroll-behavior: smooth;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Main Container */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            max-width: 850px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            margin-bottom: 50px; /* নিচের দিকে একটু জায়গা রাখার জন্য */
        }

        h2 {
            text-align: center;
            font-size: 32px;
            background: linear-gradient(to right, #00f2fe, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 2px dashed rgba(255,255,255,0.2);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        
        /* Toolbar Styles */
        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .search-box {
            flex-grow: 1;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.4);
            color: #fff;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .search-box:focus {
            border-color: #00f2fe;
            background: rgba(0,0,0,0.6);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
        .btn {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.6);
        }
        .btn-fav {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            box-shadow: 0 5px 15px rgba(246, 211, 101, 0.4);
        }
        .btn-fav:hover {
            box-shadow: 0 8px 20px rgba(246, 211, 101, 0.6);
        }

        /* Item Styles - Reading Friendly */
        .karak-item {
            margin-bottom: 20px;
            font-size: 20px;
            line-height: 1.8;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            scroll-margin-top: 100px;
        }
        .karak-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-left: 4px solid #00f2fe;
            transform: scale(1.01);
        }
        .serial {
            color: #00f2fe;
            font-weight: bold;
            font-size: 22px;
            min-width: 45px;
        }
        .sentence-content {
            flex-grow: 1;
            letter-spacing: 0.5px;
        }
        .karak-word {
            background: rgba(255, 235, 59, 0.15);
            border-bottom: 2px dashed #ffeb3b;
            padding: 2px 8px;
            border-radius: 6px;
            cursor: pointer;
            color: #ffeb3b;
            transition: 0.3s;
            font-weight: bold;
        }
        .karak-word:hover {
            background: #ffeb3b;
            color: #000;
        }
        .answer {
            display: none;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: #000;
            padding: 6px 15px;
            border-radius: 30px;
            margin-left: 15px;
            font-size: 17px;
            animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.4);
            white-space: nowrap;
        }
        
        /* Floating Right Navigator - Moved to Bottom Right */
        .right-nav {
            position: fixed;
            right: 30px;
            bottom: 30px; /* স্ক্রিনের একদম নিচে ডান কোণায় */
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; /* কন্টেন্ট নিচে থেকে শুরু হবে */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden; 
            width: 65px;
            height: 65px;
        }
        .right-nav.expanded {
            border-radius: 25px;
            width: 70px;
            height: 290px; /* প্যানেল খোলার পর উচ্চতা */
            padding-top: 15px;
            padding-bottom: 10px;
            cursor: default;
        }
        
        /* The rocket emoji always visible at the bottom */
        .rocket-toggle {
            font-size: 30px;
            user-select: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 65px;
        }
        .right-nav.expanded .rocket-toggle {
            transform: rotate(-45deg) scale(1.1);
            height: 50px;
        }

        /* Panel contents, hidden until expanded */
        .nav-panel-contents {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transition: opacity 0.3s ease;
            height: 0;
            pointer-events: none;
        }
        .right-nav.expanded .nav-panel-contents {
            opacity: 1;
            height: auto;
            pointer-events: auto;
            margin-bottom: 5px;
        }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .nav-btn:hover {
            background: #00f2fe;
            color: #000;
            transform: scale(1.1);
        }
        .jump-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            border-top: 1px dashed rgba(255,255,255,0.2);
            border-bottom: 1px dashed rgba(255,255,255,0.2);
            padding: 10px 0;
        }
        .jump-input {
            width: 40px;
            padding: 8px 5px;
            border-radius: 8px;
            border: 1px solid #4facfe;
            background: rgba(0,0,0,0.5);
            color: #fff;
            text-align: center;
            font-size: 14px;
            outline: none;
        }
        .jump-input:focus {
            background: #fff;
            color: #000;
        }
        .jump-btn {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }

        /* Favorite Icon */
        .fav-icon {
            cursor: pointer;
            font-size: 26px;
            color: rgba(255,255,255,0.2);
            transition: 0.3s;
            user-select: none;
        }
        .fav-icon.active {
            color: #f6d365;
            text-shadow: 0 0 15px rgba(246, 211, 101, 0.8);
            transform: scale(1.2);
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.8) translateX(-20px); }
            100% { opacity: 1; transform: scale(1) translateX(0); }
        }
        
        .no-results {
            text-align: center;
            color: #ff4b2b;
            font-size: 20px;
            display: none;
            padding: 30px;
            background: rgba(255,0,0,0.1);
            border-radius: 15px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .glass-panel { padding: 20px; margin-bottom: 100px; }
            .right-nav {
                right: 20px;
                bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h2>🎯 কারক ও বিভক্তি মাস্টার 📚</h2>
        
        <div class="toolbar">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 যেকোনো বাক্য বা শব্দ খুঁজুন..." onkeyup="filterItems()">
            <button class="btn btn-fav" id="favToggleBtn" onclick="toggleFavView()">⭐ ফেভারিটগুলো</button>
            <button class="btn" onclick="scrollToLastRead()">🕒 শেষ পড়া স্থানে যান</button>
        </div>

        <div id="no-results" class="no-results">কোনো ফলাফল পাওয়া যায়নি! 😢</div>
        <div id="karak-container"></div>
    </div>

    <div class="right-nav" id="rightNav" onclick="toggleNavPanel(event)">
        <div class="nav-panel-contents">
            <button class="nav-btn" onclick="window.scrollTo(0,0)" title="উপরে যান">⬆️</button>
            
            <div class="jump-container">
                <input type="number" id="jumpInput" class="jump-input" placeholder="নং">
                <button class="jump-btn" onclick="jumpToQuestion()">যান</button>
            </div>
            
            <button class="nav-btn" onclick="window.scrollTo(0, document.body.scrollHeight)" title="নিচে যান">⬇️</button>
        </div>
        
        <div class="rocket-toggle" title="কুইক ন্যাভিগেটর প্যানেল খুলুন/বন্ধ করুন">🚀</div>
    </div>

        let favorites = JSON.parse(localStorage.getItem('karakFavs')) || [];
        let showOnlyFavs = false;
        const container = document.getElementById('karak-container');

        function renderItems(filterText = "") {
            container.innerHTML = "";
            let count = 0;

            karakData.forEach((item, index) => {
                const textForSearch = item.sentence.toLowerCase() + " " + item.answer.toLowerCase();
                const isMatch = textForSearch.includes(filterText.toLowerCase());
                const isFav = favorites.includes(index);

                if (isMatch && (!showOnlyFavs || isFav)) {
                    count++;
                    let highlightedSentence;
                    if (item.sentence.includes(item.word)) {
                        highlightedSentence = item.sentence.replace(item.word, `<span class="karak-word" onclick="showAnswer(this, ${index})">${item.word}</span><span class="answer">✔️ ${item.answer}</span>`);
                    } else {
                        highlightedSentence = `<span class="karak-word" onclick="showAnswer(this, ${index})">${item.sentence}</span><span class="answer">✔️ ${item.answer}</span>`;
                    }

                    const div = document.createElement('div');
                    div.className = 'karak-item';
                    div.id = `item-${index + 1}`;
                    
                    const favClass = isFav ? 'fav-icon active' : 'fav-icon';
                    
                    div.innerHTML = `
                        <span class="serial">${index + 1}.</span> 
                        <div class="sentence-content">${highlightedSentence}</div>
                        <span class="${favClass}" onclick="toggleFavorite(${index}, this)" title="ফেভারিট করুন">★</span>
                    `;
                    container.appendChild(div);
                }
            });

            document.getElementById('no-results').style.display = count === 0 ? "block" : "none";
        }

        function showAnswer(element, index) {
            const answerSpan = element.nextElementSibling;
            if (answerSpan.style.display === "inline-block") {
                answerSpan.style.display = "none";
                element.style.background = "rgba(255, 235, 59, 0.15)";
                element.style.color = "#ffeb3b";
            } else {
                answerSpan.style.display = "inline-block";
                element.style.background = "#ffeb3b";
                element.style.color = "#000";
                localStorage.setItem('karakLastRead', index + 1);
            }
        }

        function toggleFavorite(index, element) {
            const favIndex = favorites.indexOf(index);
            if (favIndex === -1) {
                favorites.push(index);
                element.classList.add('active');
            } else {
                favorites.splice(favIndex, 1);
                element.classList.remove('active');
                if(showOnlyFavs) renderItems(); 
            }
            localStorage.setItem('karakFavs', JSON.stringify(favorites));
        }

        function filterItems() {
            const query = document.getElementById('searchInput').value;
            renderItems(query);

        function toggleFavView() {
            showOnlyFavs = !showOnlyFavs;
            const btn = document.getElementById('favToggleBtn');
            if (showOnlyFavs) {
                btn.innerHTML = "📖 সবগুলো দেখুন";
                btn.style.background = "linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)";
            } else {
                btn.innerHTML = "⭐ ফেভারিটগুলো";
                btn.style.background = "linear-gradient(135deg, #f6d365 0%, #fda085 100%)";
            }
            renderItems(document.getElementById('searchInput').value);
        }

        function scrollToLastRead() {
            const lastRead = localStorage.getItem('karakLastRead');
            if (lastRead !== null) {
                jumpToElement(lastRead);
            } else {
                alert("আপনার কোনো লাস্ট রিড ডেটা সেভ করা নেই! কোনো উত্তরের ওপর ক্লিক করুন।");
            }
        }

        // Expand/Collapse the navigation panel
        function toggleNavPanel(event) {
            const navPanel = document.getElementById('rightNav');
            
            if (event.target.classList.contains('rocket-toggle') || event.target.id === 'rightNav') {
                if (navPanel.classList.contains('expanded')) {
                    navPanel.classList.remove('expanded');
                } else {
                    navPanel.classList.add('expanded');
                    document.querySelector('.nav-panel-contents').onclick = (e) => e.stopPropagation();
                }
            }
        }

        function jumpToQuestion() {
            const num = parseInt(document.getElementById('jumpInput').value);
            if(num > 0 && num <= karakData.length) {
                if(showOnlyFavs) toggleFavView(); 
                document.getElementById('searchInput').value = ""; 
                renderItems();
                
                document.getElementById('rightNav').classList.remove('expanded');
                
                setTimeout(() => { jumpToElement(num); }, 100);
            } else {
                alert(`অনুগ্রহ করে ১ থেকে ${karakData.length} এর মধ্যে একটি নম্বর দিন!`);
            }
        }

        function jumpToElement(idNumber) {
            const element = document.getElementById(`item-${idNumber}`);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                element.style.background = "rgba(0, 242, 254, 0.3)"; 
                element.style.borderLeft = "4px solid #00f2fe";
                setTimeout(() => {
                    element.style.background = "rgba(255, 255, 255, 0.03)";
                    element.style.borderLeft = "4px solid transparent";
                }, 2500);
            }
        }

        document.getElementById("jumpInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                jumpToQuestion();
            }
        });

        document.addEventListener('click', function(event) {
            const navPanel = document.getElementById('rightNav');
            if (!navPanel.contains(event.target)) {
                navPanel.classList.remove('expanded');
            }
        });

        renderItems();
    </script>
</body>
</html>
