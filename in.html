<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Preposition Premium - BAcademy</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #6366f1;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-gold: #fbbf24;
            --accent-green: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans Bengali', sans-serif;
            background-color: #020617;
            display: flex;
            justify-content: center;
            color: var(--text-main);
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-dark);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Premium App Bar */
        .app-bar {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-bar h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.4rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        /* Premium Header Notice */
        .hero-notice {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
            border: 1px solid rgba(99, 102, 241, 0.3);
            margin: 20px;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .hero-notice h2 {
            color: #cbd5e1;
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .hero-notice span {
            display: block;
            color: var(--accent-gold);
            font-size: 1.6rem;
            font-weight: 800;
            margin-top: 5px;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
        }

        /* Word List Styling */
        .word-list {
            padding: 0 20px 100px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .group-header {
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-glow);
            padding: 10px 5px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .group-header::after {
            content: "";
            height: 1px;
            flex-grow: 1;
            background: linear-gradient(to right, var(--primary-glow), transparent);
        }

        /* Premium Word Card */
        .word-card {
            background-color: var(--card-bg);
            border-radius: 18px;
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .word-card:hover {
            border-color: rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .left-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .fav-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #475569;
            transition: all 0.3s;
            display: flex;
            align-items: center;
        }

        .fav-btn.active {
            color: #f43f5e;
            transform: scale(1.2);
        }

        .word-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .word-en {
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .word-en span {
            color: var(--accent-gold);
            font-weight: 700;
            font-size: 0.95rem;
            margin-left: 5px;
        }

        .word-pronunciation {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .word-bn {
            color: var(--accent-green);
            font-size: 0.95rem;
            font-weight: 600;
            background: rgba(16, 185, 129, 0.1);
            padding: 6px 15px;
            border-radius: 12px;
            text-align: right;
            max-width: 150px;
            line-height: 1.4;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(15px);
            height: 70px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item {
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.7rem;
            gap: 5px;
        }

        .nav-item.active {
            color: var(--primary-glow);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-bar">
        <h1>PREPOSITION PRO</h1>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    </div>

    <div class="hero-notice">
        <h2>নিচের এই সকল শব্দের পরে সর্বদা বসে</h2>
        <span>Preposition "IN"</span>
    </div>

    <div class="word-list" id="list">
        </div>

    <div class="bottom-nav">
        <div class="nav-item active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <span>Home</span>
        </div>
        <div class="nav-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            <span>Favorites</span>
        </div>
        <div class="nav-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            <span>Settings</span>
        </div>
    </div>
</div>

<script>
    // Updated words list for 'in'
    const words = [
        { g: 'A', e: 'Abound', p: 'অ্যাবাউন্ড', b: 'প্রচুর পরিমাণে থাকা' },
        { g: 'A', e: 'Absorbed', p: 'অ্যাবজর্বড', b: 'নিমগ্ন' },
        { g: 'A', e: 'Apt', p: 'অ্যাপ্ট', b: 'দক্ষ' },
        { g: 'A', e: 'Assiduous', p: 'অ্যাসিডিউয়াস', b: 'অধ্যবসায়ী' },
        { g: 'B', e: 'Believe', p: 'বিলিভ', b: 'বিশ্বাস করা' },
        { g: 'D', e: 'Deal', p: 'ডিল', b: 'কারবার করা' },
        { g: 'D', e: 'Deficient', p: 'ডেফিশিয়েন্ট', b: 'অদক্ষ' },
        { g: 'D', e: 'Delight', p: 'ডিলাইট', b: 'আনন্দ' },
        { g: 'D', e: 'Dexterity', p: 'ডেক্সটেরিটি', b: 'দক্ষতা' },
        { g: 'D', e: 'Dexterous', p: 'ডেক্সটেরাস', b: 'নিপুণ' },
        { g: 'D', e: 'Difficulty', p: 'ডিফিকাল্টি', b: 'সমস্যা' },
        { g: 'D', e: 'Diligent', p: 'ডিলিজেন্ট', b: 'অধ্যবসায়ী' },
        { g: 'E', e: 'Eager', p: 'ইগার', b: 'অনুসন্ধানী' },
        { g: 'E', e: 'Educated', p: 'এডুকেটেড', b: 'শিক্ষিত' },
        { g: 'E', e: 'Eminence', p: 'এমিনেন্স', b: 'খ্যাতি' },
        { g: 'F', e: 'Fail', p: 'ফেইল', b: 'ব্যর্থ হওয়া' },
        { g: 'F', e: 'Faith', p: 'ফেইথ', b: 'বিশ্বাস' },
        { g: 'H', e: 'Honest', p: 'অনেস্ট', b: 'সৎ' },
        { g: 'I', e: 'Indulge', p: 'ইন্ডালজ', b: 'সাধ মেটানো/প্রশ্রয় দেয়া' },
        { g: 'I', e: 'Interest', p: 'ইন্টারেস্ট', b: 'আগ্রহ' },
        { g: 'I', e: 'Interested', p: 'ইন্টারেস্টেড', b: 'আগ্রহী' },
        { g: 'I', e: 'Involved', p: 'ইনভলভড', b: 'জড়িত' },
        { g: 'J', e: 'Joy', p: 'জয়', b: 'উল্লাস' },
        { g: 'P', e: 'Pride (self)', p: 'প্রাইড', b: 'গর্ব' },
        { g: 'P', e: 'Proficiency', p: 'প্রোফিশিয়েন্সি', b: 'দক্ষতা' },
        { g: 'P', e: 'Proficient', p: 'প্রোফিশিয়েন্ট', b: 'দক্ষ' },
        { g: 'R', e: 'Rich', p: 'রিচ', b: 'সমৃদ্ধ' },
        { g: 'S', e: 'Skillful', p: 'স্কিলফুল', b: 'পটু' },
        { g: 'T', e: 'Trust', p: 'ট্রাস্ট', b: 'বিশ্বাস করা' }
    ];

    const listContainer = document.getElementById('list');
    let currentGroup = '';

    words.forEach(word => {
        if (word.g !== currentGroup) {
            currentGroup = word.g;
            const header = document.createElement('div');
            header.className = 'group-header';
            header.innerText = currentGroup;
            listContainer.appendChild(header);
        }

        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerHTML = `
            <div class="left-content">
                <button class="fav-btn" onclick="this.classList.toggle('active')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </button>
                <div class="word-info">
                    <span class="word-en">${word.e} <span>in</span></span>
                    <span class="word-pronunciation">${word.p}</span>
                </div>
            </div>
            <div class="word-bn">${word.b}</div>
        `;
        listContainer.appendChild(card);
    });
</script>

</body>
</html>
